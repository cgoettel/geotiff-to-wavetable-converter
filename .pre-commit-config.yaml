# File hygiene (trailing-whitespace, end-of-file-fixer, check-added-large-files,
# mixed-line-ending, check-merge-conflict), markdown formatting, secret scanning,
# and conventional commit-msg linting now live in the fleet-wide global pre-commit
# hygiene tier (~/.config/pre-commit/global.yaml, run via core.hooksPath). This
# config keeps only the language-specific toolchain, which CI also mirrors.
repos:
    - repo: https://github.com/pre-commit/mirrors-mypy
      rev: v1.20.2
      hooks:
          - id: mypy
            args: [--strict, --ignore-missing-imports]
    - repo: https://github.com/astral-sh/ruff-pre-commit
      rev: v0.15.21
      hooks:
          - id: ruff
            args: [--fix]
          - id: ruff-format
