[project]
name = "geotiff-to-wavetable"
version = "0.1.0"
description = "Utility to convert GeoTIFF to WAV"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "matplotlib>=3.10.1",
    "opencv-python>=4.11.0.86",
    "rasterio>=1.4.3",
]

[project.optional-dependencies]
test = [
    "pytest>=8.3.2",
    "pre_commit>=4.5.1",
    "black>=24.4.2",
]
